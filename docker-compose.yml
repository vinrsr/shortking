services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortking
      POSTGRES_PASSWORD: shortking
      POSTGRES_DB: shortking
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shortking" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
  # Optional: containerized API for full-stack `docker compose up`.
  # For day-to-day dev, run `pnpm dev` against postgres/redis above and let
  # Go/Next hot-reload natively, faster iteration. Uncomment for CI/onboarding
  # parity runs.
  # api:
  #   build: ./apps/api
  #   environment:
  #     DATABASE_URL: postgres://shortking:shortking@postgres:5432/shortking?sslmode=disable
  #     REDIS_URL: redis://redis:6379
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  pgdata:
