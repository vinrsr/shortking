services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortking
      POSTGRES_PASSWORD: shortking
      POSTGRES_DB: shortking
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shortking" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  shortking-api:
    build: ./apps/api
    env_file:
      - .env.production
    networks:
      - default
      - web
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

networks:
  web:
    external: true
